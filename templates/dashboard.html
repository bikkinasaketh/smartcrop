<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Crop Dashboard</title>

<style>

body{

margin:0;
font-family:Arial;

background:url("/static/images/farm.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

/* navbar */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,0.6);

color:white;

padding:15px 40px;

}

.navbar a{

color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;

}

/* dashboard */

.dashboard{

padding:60px;
text-align:center;

}

/* heading */

.dashboard h1{

color:white;

}

/* cards layout */

.cards{

display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;

margin-top:40px;

}

/* glass card design */

.card{

background:rgba(255,255,255,0.2);

backdrop-filter: blur(10px);

padding:40px;

border-radius:15px;

width:220px;

box-shadow:0px 8px 25px rgba(0,0,0,0.3);

color:white;

text-align:center;

}

/* card heading */

.card h3{

color:#90ee90;

}

/* card number */

.card p{

font-size:32px;
font-weight:bold;
color:white;

}

</style>

</head>


<body>


<div class="navbar">

<h2>🌱 Smart Crop Recommendation</h2>

<div>

<a href="/predict">Predict Crop</a>

<a href="/logout">Logout</a>

</div>

</div>


<div class="dashboard">

<h1>Farmer Dashboard</h1>

<div class="cards">


<div class="card">

<h3>Total Users</h3>

<p>{{ users }}</p>

</div>


<div class="card">

<h3>Total Predictions</h3>

<p>{{ predictions }}</p>

</div>


<div class="card">

<h3>Model Accuracy</h3>

<p>{{ accuracy }}%</p>

</div>


<div class="card">

<h3>Soil Moisture</h3>

<p>{{ soil }}%</p>

</div>


</div>

</div>

</body>
</html>
