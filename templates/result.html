<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Result</title>

<style>

body{

margin:0;
font-family:Arial;

background:url("/static/images/farm.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

/* glass result box */

.result-box{

background:rgba(255,255,255,0.2);

backdrop-filter:blur(12px);

padding:50px;

border-radius:15px;

width:600px;

text-align:center;

box-shadow:0px 10px 30px rgba(0,0,0,0.4);

color:white;

}

/* heading */

h1{

margin-bottom:25px;
color:white;

}

/* crop result */

.crop{

background:rgba(0,255,150,0.25);

padding:20px;

border-radius:10px;

font-size:30px;

font-weight:bold;

margin-bottom:30px;

}

/* button */

button{

padding:12px 28px;

background:#2e7d32;

border:none;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#1b5e20;

}

</style>

</head>

<body>

<div class="result-box">

<h1>🌱 Recommended Crop</h1>

<div class="crop">

{{ result }}

</div>

<a href="/dashboard">

<button>Back to Dashboard</button>

</a>

</div>

</body>
</html>
