<!DOCTYPE html>
<html>

<head>

<title>Smart Crop Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

margin:0;
font-family:Arial;

background:url("/static/images/farm.jpg");
background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* LOGIN BOX */

.container{

background:rgba(0,128,0,0.25);

backdrop-filter:blur(10px);

padding:40px;

border-radius:15px;

width:350px;

box-shadow:0px 10px 30px rgba(0,0,0,0.5);

color:white;

}

h2{

text-align:center;

margin-bottom:25px;

}

label{

display:block;

margin-top:10px;

font-weight:bold;

}

input{

width:100%;

padding:12px;

margin-top:6px;
margin-bottom:15px;

border-radius:8px;

border:none;

outline:none;

}

button{

width:100%;

padding:12px;

background:#2e7d32;

border:none;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#1b5e20;

}

.link{

text-align:center;

margin-top:15px;

}

.link a{

color:white;

font-weight:bold;

text-decoration:none;

}

</style>

</head>


<body>


<div class="container">

<h2>🌱 Smart Crop Login</h2>

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

<div class="link">

<p>Don't have account? <a href="/signup">Signup</a></p>

</div>

</div>


</body>
</html>
