<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Prediction</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background:url("/static/images/farm.jpg");
background-size:cover;
background-position:center;

}

/* center container */

.container{

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

/* form box */
.form-box
{
 background:url("/static/images/farm.jpg"); 
 background-size:cover; 
 background-position:center;
  padding:40px; 
  border-radius:12px; 
  width:700px; 
  box-shadow:0px 10px 30px rgba(0,0,0,0.3); }

/* heading */

h2{

text-align:center;

color:#2e7d32;

margin-bottom:30px;

}

/* grid layout */

.form-grid{

display:grid;

grid-template-columns:1fr 1fr;

column-gap:30px;

row-gap:20px;

}

/* label */

label{

font-weight:bold;

display:block;

margin-bottom:6px;

}

/* inputs */

input{

width:100%;

padding:12px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

/* button */

.button-box{

text-align:center;

margin-top:30px;

}

button{

width:220px;

padding:13px;

background:#2e7d32;

border:none;

color:white;

font-size:17px;

border-radius:10px;

cursor:pointer;

}

button:hover{

background:#1b5e20;

}

/* back link */

.back{

text-align:center;

margin-top:15px;

}

.back a{

text-decoration:none;

color:#2e7d32;

font-weight:bold;

}

</style>

</head>

<body>


<div class="container">

<div class="form-box">

<h2>🌱 Smart Crop Prediction</h2>

<form method="POST">

<div class="form-grid">

<div>
<label>Nitrogen</label>
<input type="number" name="N" required>
</div>

<div>
<label>Phosphorus</label>
<input type="number" name="P" required>
</div>

<div>
<label>Potassium</label>
<input type="number" name="K" required>
</div>

<div>
<label>Temperature</label>
<input type="number" step="0.1" name="temp" required>
</div>

<div>
<label>Humidity</label>
<input type="number" step="0.1" name="humidity" required>
</div>

<div>
<label>pH</label>
<input type="number" step="0.1" name="ph" required>
</div>

<div>
<label>Rainfall</label>
<input type="number" step="0.1" name="rainfall" required>
</div>

<div>
<label>Soil Moisture</label>
<input type="number" step="0.1" name="soil_moisture" required>
</div>

</div>

<div class="button-box">

<button type="submit">Predict Crop</button>

</div>

</form>

<div class="back">

<a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</div>

</div>

</body>
</html>
